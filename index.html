<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="header">
        <h1>🌤 Weather Dashboard</h1>
        <p>Current Weather & 5-Day Forecast</p>
    </header>

    <main class="container">

        <!-- Search Section -->
        <section class="search-section">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name"
                aria-label="City Name">

            <button id="searchBtn">
                Search
            </button>
        </section>

        <!-- Loading State -->
        <section
            id="loading"
            class="loading hidden"
            aria-live="polite">
            Loading weather data...
        </section>

        <!-- Error Message -->
        <section
            id="errorMessage"
            class="error hidden"
            aria-live="assertive">
        </section>

        <!-- Current Weather -->
        <section class="weather-card">

            <h2>Current Weather</h2>

            <div class="weather-info">

                <h3 id="cityName">
                    Search for a city
                </h3>

                <img
                    id="weatherIcon"
                    src=""
                    alt="Weather Icon">

                <p id="temperature">-- °C</p>

                <p id="description">
                    Weather Description
                </p>

                <p id="humidity">
                    Humidity: --
                </p>

                <p id="windSpeed">
                    Wind Speed: --
                </p>

            </div>

        </section>

        <!-- Forecast Section -->
        <section class="forecast-section">

            <h2>5-Day Forecast</h2>

            <div
                id="forecastContainer"
                class="forecast-grid">

                <!-- Forecast Cards Added Here Dynamically -->

            </div>

        </section>

    </main>

    <footer>
        <p>
            Weather Dashboard Project © 2026
        </p>
    </footer>

    <!-- JavaScript Modules -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
